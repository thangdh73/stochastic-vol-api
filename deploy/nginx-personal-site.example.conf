# Example nginx config — embed Stochastic volume calculation under your personal site.
# Replace YOUR_DOMAIN and paths to match your server.

# Upstream: FastAPI (run via docker-compose or systemd on port 8002)
upstream stochastic_vol_api {
    server 127.0.0.1:8002;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ssl_certificate ...
    # ssl_certificate_key ...

    root /var/www/your-personal-site;
    index index.html;

    # --- Your main personal site (existing) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Technical corner: Stochastic volume calculation ---
    # Static UI (copy frontend/dist/ here):
    #   /var/www/your-personal-site/technical-corner/stochastic-volume/

    location = /technical-corner/stochastic-volume/health {
        proxy_pass http://stochastic_vol_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /technical-corner/stochastic-volume/api/ {
        proxy_pass http://stochastic_vol_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    location /technical-corner/stochastic-volume/ {
        alias /var/www/your-personal-site/technical-corner/stochastic-volume/;
        try_files $uri $uri/ /technical-corner/stochastic-volume/index.html;
    }
}
