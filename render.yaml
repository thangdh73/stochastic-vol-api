services:
  - type: web
    name: stochastic-vol-api
    runtime: docker
    dockerfilePath: deploy/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MMRA_DATABASE_URL
        value: sqlite:////app/backend/mmra.db
      - key: PYTHONPATH
        value: /app/engine
      - key: MMRA_JWT_SECRET
        sync: false
      - key: MMRA_AUTH_USERS
        sync: false
