# Render.com — deploy the calculation API (free tier).
# Dashboard: New → Blueprint → connect repo → apply this file.
# Or: https://render.com/deploy?repo=https://github.com/thangdh73/stochastic-vol-api

services:
  - type: web
    name: stochastic-vol-api
    runtime: docker
    dockerfilePath: deploy/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MMRA_DATABASE_URL
        value: sqlite:////app/backend/mmra.db
      - key: PYTHONPATH
        value: /app/engine
